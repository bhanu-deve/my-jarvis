name: 🤖 Jarvis Bot

on:
  # ── 1. Run on a SCHEDULE (cron) ──────────────────────────────
  # Format: minute hour day month weekday (UTC)
  schedule:
    - cron: "0 8 * * *"    # Every day at 8:00 AM UTC
    # - cron: "0 */6 * * *"  # Every 6 hours
    # - cron: "0 9 * * 1"    # Every Monday at 9 AM UTC

  # ── 2. Run MANUALLY from GitHub UI ───────────────────────────
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run?"
        required: true
        default: "hello"
        type: choice
        options:
          - hello
          - check_website
          - scrape_news
          - custom

  # ── 3. Run on every PUSH to main ─────────────────────────────
  # push:
  #   branches: [main]

jobs:
  run-jarvis:
    name: Run Jarvis Task
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Step 1: Get the code ──────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ─────────────────────────────────
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Step 3: Install dependencies (if any) ─────────────────
      - name: 📦 Install Dependencies
        run: |
          pip install requests --quiet
          # Add more packages here if your tasks need them
          # pip install beautifulsoup4 pandas etc.

      # ── Step 4: Run Jarvis ────────────────────────────────────
      - name: 🤖 Run Jarvis
        env:
          # Task to run — from manual trigger or default
          JARVIS_TASK: ${{ github.event.inputs.task || 'hello' }}

          # Email credentials (set these in GitHub Secrets!)
          JARVIS_EMAIL:          ${{ secrets.JARVIS_EMAIL }}
          JARVIS_EMAIL_PASSWORD: ${{ secrets.JARVIS_EMAIL_PASSWORD }}
          JARVIS_NOTIFY_EMAIL:   ${{ secrets.JARVIS_NOTIFY_EMAIL }}

          # Optional: URL to check (used by check_website task)
          JARVIS_CHECK_URL: ${{ vars.JARVIS_CHECK_URL || 'https://google.com' }}

        run: python jarvis.py

      # ── Step 5: Show status ───────────────────────────────────
      - name: ✅ Done
        if: always()
        run: echo "Jarvis finished. Check your email!"
